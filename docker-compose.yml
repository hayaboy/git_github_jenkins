version: '3.9'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jira_jenkins_confluence_jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - ./data/jenkins:/var/jenkins_home
    restart: unless-stopped

  jira:
    image: atlassian/jira-software:8.20.10
    container_name: jira_jenkins_confluence_jira
    ports:
      - "8081:8080"
    environment:
      - JVM_MINIMUM_MEMORY=1024m
      - JVM_MAXIMUM_MEMORY=2048m
    volumes:
      - ./data/jira:/var/atlassian/application-data/jira
    restart: unless-stopped

  confluence:
    image: atlassian/confluence-server:7.19.5
    container_name: jira_jenkins_confluence_confluence
    ports:
      - "8090:8090"
    volumes:
      - ./data/confluence:/var/atlassian/application-data/confluence
    restart: unless-stopped
